# ==========================================
# 墙外使用版：仅分流 AI 相关流量
# 设计目标：
# 1. 适用于墙外网络环境，绝大多数流量保持直连
# 2. 仅 AI 相关服务命中规则后走代理
# 3. 关闭 DNS / Sniffer / TUN，仅保留端口代理与 AI 规则分流
# ==========================================

# ==========================================
# 全局配置 (General)
# ==========================================
mixed-port: 7890 # 混合端口，同时支持 HTTP 和 SOCKS5
allow-lan: true # 允许局域网设备(如手机/iPad)连接此代理
bind-address: "*" # 监听所有网络接口
mode: rule
log-level: info # 日志级别：打印重要连接信息，不影响性能
ipv6: false # 是否允许内核接受 IPv6 流量
find-process-mode: always # 始终追踪发起网络连接的具体进程名
unified-delay: true # 使用真实 HTTP 响应时间作为测速延迟，而不是虚假的 TCP 握手时间
tcp-concurrent: true # 并发连接域名的所有 IP，极大提升首次加载速度

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    include-all: true

  - name: "♊ Gemini"
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "💬 Ai平台"
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    include-all: true
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

rule-providers:
  ai-suite-gemini: &classical_yaml_provider
    type: http
    behavior: classical
    interval: 86400
    proxy: DIRECT
    path: ./ruleset/ai-suite-gemini.yaml
    url: "https://cdn.jsdmirror.com/gh/chiyuchia/proxy-rule@master/custom_rule/ai_suite_gemini.yaml"

  local-area-network:
    <<: *classical_yaml_provider
    path: ./ruleset/local-area-network.yaml
    url: "https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/LocalAreaNetwork.yaml"

  ai:
    <<: *classical_yaml_provider
    path: ./ruleset/ai.yaml
    url: "https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/AI.yaml"

  ai-suite:
    <<: *classical_yaml_provider
    path: ./ruleset/ai-suite.yaml
    url: "https://cdn.jsdmirror.com/gh/dler-io/Rules@main/Clash/Provider/AI%20Suite.yaml"

  openai:
    <<: *classical_yaml_provider
    path: ./ruleset/openai.yaml
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml"

  copilot:
    <<: *classical_yaml_provider
    path: ./ruleset/copilot.yaml
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Copilot/Copilot.yaml"

  gemini:
    <<: *classical_yaml_provider
    path: ./ruleset/gemini.yaml
    url: "https://cdn.jsdmirror.com/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.yaml"

rules:
  - "RULE-SET,local-area-network,🎯 全球直连"
  - "RULE-SET,ai-suite-gemini,♊ Gemini"
  - "RULE-SET,gemini,♊ Gemini"
  - "RULE-SET,openai,💬 Ai平台"
  - "RULE-SET,copilot,💬 Ai平台"
  - "RULE-SET,ai,💬 Ai平台"
  - "RULE-SET,ai-suite,💬 Ai平台"
  - "GEOSITE,category-ai-!cn,💬 Ai平台"
  - "MATCH,🎯 全球直连"
